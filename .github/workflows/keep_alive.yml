name: Keep App Alive

on:
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests

      # Rimuoviamo temporaneamente la cache per essere sicuri che scarichi tutto
      # Una volta che funziona, potrai riaggiungerla cambiando la 'key'
      - name: Installa Playwright Browser e Dipendenze
        run: |
          python -m playwright install chromium --with-deps

      - name: Esegui script keep alive
        run: python keep_alive.py
        env:
          APP_URL: https://quizpygym.streamlit.app/
